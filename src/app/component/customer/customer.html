<div class="card">
    <div class="card-header">
        <h3>Customer List
        </h3>
        <div class="header-actions">
            <button mat-stroked-button color="primary" (click)="openAddCustomerDialog()">
                + Add Customer
            </button>
        </div>
    </div>

<mat-form-field>
  <mat-label>Search</mat-label>
  <input matInput (keyup)="applyFilter($event)" placeholder="Search by Customer Name, number, GST No etc" #input>
</mat-form-field>
    <table mat-table [dataSource]="dataSource" matSort (matSortChange)="announceSortChange($event)" class="mat-elevation-z8 demo-table">

        <ng-container matColumnDef="customerName">
            <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by customer"> Customer </th>
            <td mat-cell *matCellDef="let element"> {{element.customerName}} </td>
        </ng-container>

        <!-- Customer -->
        <ng-container matColumnDef="number">
            <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by number"> Number </th>
            <td mat-cell *matCellDef="let element"> {{element.number}} </td>
        </ng-container>

        <!-- Amount -->
        <ng-container matColumnDef="gstNo">
            <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by GST No"> GST No </th>
            <td mat-cell *matCellDef="let element"> {{element.gstNo}} </td>
        </ng-container>
         <ng-container matColumnDef="openBalance">
            <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by Open Balance"> Opening Balance </th>
            <td mat-cell *matCellDef="let element"> {{element.openBalance}} </td>
        </ng-container> 
        <ng-container matColumnDef="closeBalance">
            <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by Close Balance"> Closing Balance </th>
            <td mat-cell *matCellDef="let element"> {{element.closeBalance}} </td>
        </ng-container>

        <ng-container matColumnDef="update">
            <th mat-header-cell *matHeaderCellDef> Update </th>
            <td mat-cell *matCellDef="let element">
                <button mat-button color="primary" (click)="openAddCustomerDialog(element)">
                    Update
                </button>
            </td>
        </ng-container>  
        <ng-container matColumnDef="delete">
            <th mat-header-cell *matHeaderCellDef> Delete </th>
            <td mat-cell *matCellDef="let element">
                <button mat-button color="primary" (click)="deleteCustomerDialog(element)">
                    Delete
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
         <tr
            mat-row
            (click)="clickedRows.add(row)"
            [class.demo-row-is-clicked]="clickedRows.has(row)"
            *matRowDef="let row; columns: displayedColumns;"
        ></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Select page of periodic elements">
    </mat-paginator>
</div>
<ng-template #callAPIDialog let-data>
    <h2 matDialogTitle>Customer : {{ data.customer.customerName }}</h2>
    <mat-dialog-content>
        Are you sure you want to delete this customer?
    </mat-dialog-content>
    <mat-dialog-actions align="end">
        <button mat-button matDialogClose="no" >No</button>
        <button mat-button matDialogClose="yes" >Yes</button>
    </mat-dialog-actions>
</ng-template>
