
    <div class="card">
        <div class="card-header">
            <h3>Brand List
            </h3>
            <div class="header-actions">
                <button mat-stroked-button color="primary" routerLink="/product">
                    Product List
                </button>
                <button mat-stroked-button color="primary" (click)="openAddBrandDialog()">
                    + Add Brand
                </button>
            </div>
        </div>
        <table mat-table [dataSource]="brandDataSource" class="mat-elevation-z8 demo-table">
            <!-- Brand -->
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef> Brand </th>
                <td mat-cell *matCellDef="let element"> {{element.name}} </td>
            </ng-container>
            <ng-container matColumnDef="update">
                <th mat-header-cell *matHeaderCellDef> Update </th>
                <td mat-cell *matCellDef="let element">
                    <button mat-button color="primary" (click)="openAddBrandDialog(element)">
                        Update
                    </button>
                </td>
            </ng-container>
            <ng-container matColumnDef="delete">
                <th mat-header-cell *matHeaderCellDef> Delete </th>
                <td mat-cell *matCellDef="let element">
                    <button mat-button color="primary" (click)="deleteBrandDialog(element)">
                        Delete
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedBrandColumns"></tr>
            <tr mat-row (click)="clickedBrandRows.add(row)" [class.demo-row-is-clicked]="clickedBrandRows.has(row)"
                *matRowDef="let row; columns: displayedBrandColumns;"></tr>
        </table>
    </div>
<ng-template #callAPIDialog let-data>
    <h2 matDialogTitle>Brand : {{ data.brandName }}</h2>
    <mat-dialog-content>
        Are you sure you want to delete this product brand?
    </mat-dialog-content>
    <mat-dialog-actions align="end">
        <button mat-button matDialogClose="no" >No</button>
        <button mat-button matDialogClose="yes" >Yes</button>
    </mat-dialog-actions>
</ng-template>
